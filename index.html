<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense &amp; Budget Visualizer - Sandra</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Site-wide banner: storage error, shown only when localStorage fails -->
  <div id="storage-warning" role="alert" aria-live="assertive" hidden>
    Could not load saved data. Starting fresh.
  </div>

  <header>
    <h1>Expense &amp; Budget Visualizer</h1>

    <!-- Live balance region: aria-live so screen readers announce updates -->
    <p id="balance-container">
      <span id="balance-label">Total:</span>
      <output id="balance" aria-live="polite" aria-atomic="true" for="transaction-form">$0.00</output>
    </p>

    <button id="theme-toggle" type="button" aria-label="Switch to dark mode">🌙</button>
  </header>

  <main>

    <!-- ── Add Transaction ─────────────────────────────────── -->
    <section id="form-section" aria-labelledby="form-heading">
      <h2 id="form-heading">Add Transaction</h2>

      <form id="transaction-form" novalidate aria-label="New transaction">
        <div class="field-group">
          <label for="input-name">Item name</label>
          <input
            id="input-name"
            type="text"
            placeholder="e.g. Coffee"
            autocomplete="off"
            aria-required="true"
            aria-describedby="error-name"
          >
          <span id="error-name" class="error" role="alert" aria-live="polite"></span>
        </div>

        <div class="field-group">
          <label for="input-amount">Amount ($)</label>
          <input
            id="input-amount"
            type="number"
            placeholder="0.00"
            min="0.01"
            step="0.01"
            aria-required="true"
            aria-describedby="error-amount"
          >
          <span id="error-amount" class="error" role="alert" aria-live="polite"></span>
        </div>

        <div class="field-group">
          <label for="input-category">Category</label>
          <select
            id="input-category"
            aria-required="true"
            aria-describedby="error-category"
          >
            <option value="">Select category</option>
          </select>
          <span id="error-category" class="error" role="alert" aria-live="polite"></span>
        </div>

        <button type="submit">Add Transaction</button>
      </form>

      <!-- ── Manage Categories ──────────────────────────────── -->
      <section id="category-manager" aria-labelledby="cat-manager-heading">
        <h3 id="cat-manager-heading">Manage Categories</h3>

        <div id="category-add-row">
          <label for="input-new-category" class="sr-only">New category name</label>
          <input
            id="input-new-category"
            type="text"
            placeholder="New category name"
            autocomplete="off"
            aria-describedby="error-new-category"
          >
          <button id="btn-add-category" type="button">Add</button>
          <span id="error-new-category" class="error" role="alert" aria-live="polite"></span>
        </div>

        <ul id="category-list" aria-label="Category list"></ul>
      </section>
    </section>

    <!-- ── Transaction List ────────────────────────────────── -->
    <section id="list-section" aria-labelledby="list-heading">
      <h2 id="list-heading">Transactions</h2>

      <div id="sort-controls" role="group" aria-label="Sort transactions">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="default">Default (date added)</option>
          <option value="amount-asc">Amount: Low → High</option>
          <option value="amount-desc">Amount: High → Low</option>
          <option value="category-asc">Category: A → Z</option>
        </select>
      </div>

      <ul id="transaction-list" aria-label="Transaction list" aria-live="polite"></ul>
    </section>

    <!-- ── Spending Chart ──────────────────────────────────── -->
    <section id="chart-section" aria-labelledby="chart-heading">
      <h2 id="chart-heading">Spending by Category</h2>

      <canvas
        id="spending-chart"
        role="img"
        aria-label="Pie chart showing spending distribution by category"
      ></canvas>

      <p id="chart-empty-state" hidden>No transactions yet.</p>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
